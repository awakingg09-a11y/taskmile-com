<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskMile - Google Login Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; }
        #loading-overlay { background: #FFCD00; z-index: 10000; transition: opacity 0.5s; }
        .google-btn { 
            background: white; border-radius: 16px; padding: 14px; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            width: 100%; font-weight: 800; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .google-btn:active { transform: scale(0.98); }
    </style>
</head>
<body class="max-w-md mx-auto bg-gray-50 min-h-screen relative shadow-2xl">

    <!-- Auth & Loading Screen -->
    <div id="loading-overlay" class="fixed inset-0 flex flex-col items-center justify-center p-8 text-center">
        <div id="loader-content">
            <div class="animate-bounce mb-4 text-white text-6xl">
                <i class="fas fa-coins"></i>
            </div>
            <h1 class="text-4xl font-black italic mb-2 text-black">TaskMile</h1>
            <p id="status-text" class="text-[10px] font-bold text-black/60 uppercase tracking-widest">Checking Authentication...</p>
        </div>

        <!-- Hidden Login Box -->
        <div id="login-container" class="hidden w-full mt-10">
            <div class="bg-white/20 p-6 rounded-[32px] backdrop-blur-sm">
                <p class="text-sm font-bold mb-6 text-black">Sign in to start earning</p>
                <button id="google-login-btn" class="google-btn">
                    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" class="w-6" alt="Google">
                    <span>Continue with Google</span>
                </button>
            </div>
        </div>

        <!-- Debug Error Box -->
        <div id="error-box" class="hidden mt-6 p-4 bg-red-500 text-white rounded-2xl text-left w-full shadow-lg">
            <p class="text-[10px] font-black uppercase mb-1">Auth Error Found:</p>
            <p id="error-msg" class="text-[11px] font-mono break-all"></p>
            <p class="text-[9px] mt-2 opacity-80 italic">Tip: Add this URL to "Authorized Domains" in Firebase Settings.</p>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="app-content" class="hidden">
        <header class="bg-[#FFCD00] p-4 flex justify-between items-center sticky top-0 z-50">
            <h1 class="text-2xl font-black italic">TaskMile</h1>
            <div class="bg-white/40 px-4 py-2 rounded-full flex items-center gap-2">
                <span class="text-sm font-black" id="balance-val">0.00</span>
                <span class="text-xs">🪙</span>
            </div>
        </header>

        <div class="p-4">
            <!-- Balance Card -->
            <div class="bg-black text-white p-6 rounded-[32px] mb-6 shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold text-yellow-400 uppercase tracking-widest mb-1">Wallet Balance</p>
                    <h2 class="text-4xl font-black italic">₹<span id="stat-balance">0.00</span></h2>
                    <div class="mt-4 flex items-center gap-3">
                        <img id="user-avatar" class="w-6 h-6 rounded-full border border-white/20" src="">
                        <span id="user-display-name" class="text-[10px] font-bold opacity-70">User</span>
                    </div>
                </div>
                <i class="fas fa-wallet absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12"></i>
            </div>

            <h3 class="font-black text-gray-800 mb-4 px-2">TASKS FOR YOU</h3>
            
            <div class="space-y-3">
                <div onclick="alert('Task tracking starting...')" class="bg-white p-5 rounded-[24px] border border-gray-100 flex items-center gap-4 shadow-sm active:bg-gray-50">
                    <div class="w-12 h-12 bg-blue-500 text-white flex items-center justify-center rounded-2xl text-xl shadow-lg shadow-blue-200">
                        <i class="fab fa-telegram-plane"></i>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs font-black">TELEGRAM BOOST</p>
                        <p class="text-[10px] text-gray-400">Join & stay for 24h</p>
                    </div>
                    <div class="text-right">
                        <div class="font-black text-green-600">+ ₹50</div>
                        <div class="text-[8px] text-gray-300 font-bold uppercase">Ready</div>
                    </div>
                </div>
            </div>

            <button onclick="logout()" class="w-full mt-10 py-4 text-gray-400 text-[10px] font-black uppercase tracking-widest">
                <i class="fas fa-sign-out-alt mr-2"></i>Logout Account
            </button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithRedirect, getRedirectResult, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8ojmpCLGwapx2VdC1trWwXQYz08tfos4",
            authDomain: "taskmile-13678.firebaseapp.com",
            projectId: "taskmile-13678",
            storageBucket: "taskmile-13678.firebasestorage.app",
            messagingSenderId: "489392612402",
            appId: "1:489392612402:web:b565059c586e4a16af482b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        const statusText = document.getElementById('status-text');
        const loginContainer = document.getElementById('login-container');
        const errorBox = document.getElementById('error-box');
        const errorMsg = document.getElementById('error-msg');
        const appContent = document.getElementById('app-content');
        const loadingOverlay = document.getElementById('loading-overlay');

        // Capture Redirect Error
        getRedirectResult(auth).catch((error) => {
            console.error(error);
            errorBox.classList.remove('hidden');
            errorMsg.innerText = `${error.code}: ${error.message}`;
            statusText.innerText = "Login Failed";
        });

        // Google Login Trigger
        document.getElementById('google-login-btn').onclick = () => {
            signInWithRedirect(auth, provider);
        };

        // Auth Watcher
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                statusText.innerText = "Accessing Database...";
                const userRef = doc(db, 'users', user.uid);
                
                try {
                    const snap = await getDoc(userRef);
                    if (!snap.exists()) {
                        await setDoc(userRef, { 
                            balance: 0, 
                            tasks: 0, 
                            email: user.email,
                            name: user.displayName,
                            photo: user.photoURL
                        });
                    }

                    // UI Updates
                    document.getElementById('user-avatar').src = user.photoURL || 'https://www.w3schools.com/howto/img_avatar.png';
                    document.getElementById('user-display-name').innerText = user.displayName || user.email;
                    
                    loadingOverlay.style.opacity = '0';
                    setTimeout(() => {
                        loadingOverlay.classList.add('hidden');
                        appContent.classList.remove('hidden');
                    }, 500);

                    // Sync Data
                    onSnapshot(userRef, (docSnap) => {
                        const data = docSnap.data();
                        if(data) {
                            document.getElementById('balance-val').innerText = (data.balance || 0).toFixed(2);
                            document.getElementById('stat-balance').innerText = (data.balance || 0).toFixed(2);
                        }
                    });

                } catch (e) {
                    errorBox.classList.remove('hidden');
                    errorMsg.innerText = "Firestore Error: " + e.message;
                }
            } else {
                statusText.classList.add('hidden');
                loginContainer.classList.remove('hidden');
            }
        });

        window.logout = () => {
            signOut(auth).then(() => location.reload());
        };
    </script>
</body>
</html>
