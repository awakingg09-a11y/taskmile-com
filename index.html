<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskMile - Official App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap');
        body { font-family: 'Roboto', sans-serif; background-color: #FDFDFD; user-select: none; margin: 0; padding-bottom: 70px; }
        .bg-theme-yellow { background-color: #FFCD00; }
        .bg-theme-green { background-color: #069837; }
        .logo-text { font-weight: 900; font-style: italic; color: #FFCD00; text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; inset: 0; background: #FFCD00; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .auth-card { background: white; width: 100%; max-width: 350px; padding: 40px 30px; border-radius: 40px; box-shadow: 0 20px 40px rgba(0,0,0,0.1); text-align: center; }
        .google-btn { width: 100%; background: white; border: 2px solid #f0f0f0; padding: 15px; border-radius: 20px; display: flex; align-items: center; justify-content: center; gap: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .google-btn:active { transform: scale(0.95); background: #fafafa; }

        /* Navigation */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: #FFCD00; height: 65px; display: flex; justify-content: space-around; align-items: center; border-radius: 25px 25px 0 0; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #000; text-decoration: none; font-size: 10px; font-weight: bold; }
        .nav-item i { font-size: 20px; margin-bottom: 2px; }

        /* Views */
        .app-view { display: none; padding: 15px; animation: slideUp 0.3s ease-out; }
        .app-view.active { display: block; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Profile Card */
        .profile-card { background: white; border-radius: 35px; border: 1px solid #eee; padding: 30px; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.02); }
    </style>
</head>
<body>

    <!-- Login Screen -->
    <div id="auth-screen">
        <div class="auth-card">
            <div class="text-5xl logo-text mb-4 italic">TaskMile</div>
            <h2 class="text-xl font-bold text-gray-800">Welcome</h2>
            <p class="text-gray-400 text-sm mb-8">Login karke paise kamana shuru karein</p>
            <button onclick="handleGoogleLogin()" class="google-btn">
                <img src="https://cdn-icons-png.flaticon.com/512/300/300221.png" class="w-6 h-6">
                <span>Google Login</span>
            </button>
        </div>
    </div>

    <!-- Main App UI -->
    <div id="main-app" style="display:none;">
        <header class="bg-theme-yellow p-4 flex justify-between items-center sticky top-0 z-50">
            <div class="text-2xl logo-text">TaskMile</div>
            <div class="flex items-center gap-2">
                <div class="bg-black/10 rounded-full px-3 py-1 flex items-center gap-1 font-bold text-sm">
                    <span class="text-yellow-600">PKR</span>
                    <span id="balance">0.00</span>
                </div>
                <img id="u-img-nav" class="w-8 h-8 rounded-full border-2 border-white" src="">
            </div>
        </header>

        <!-- Home Page -->
        <div id="view-home" class="app-view active">
            <div class="bg-green-600 rounded-2xl p-4 text-white flex justify-between items-center mb-4">
                <div>
                    <h2 class="font-bold">Daily Tasks</h2>
                    <p class="text-xs opacity-80">Earn up to 5000 today</p>
                </div>
                <i class="fas fa-coins text-3xl text-yellow-300"></i>
            </div>
            
            <h3 class="font-bold mb-3">Available Tasks</h3>
            <div class="space-y-3">
                <!-- Task item -->
                <div class="bg-white p-4 rounded-2xl border border-gray-100 flex justify-between items-center shadow-sm">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-red-100 rounded-full flex items-center justify-center text-red-600"><i class="fab fa-youtube"></i></div>
                        <div>
                            <p class="text-sm font-bold">Watch Video</p>
                            <p class="text-[10px] text-gray-400">Time: 30s</p>
                        </div>
                    </div>
                    <span class="text-green-600 font-bold text-sm">+25.00</span>
                </div>
            </div>
        </div>

        <!-- Profile Page (Jo aapne screenshot mein dekha) -->
        <div id="view-mine" class="app-view">
            <div class="profile-card mt-4">
                <img id="u-img-big" class="w-24 h-24 rounded-full mx-auto border-4 border-yellow-400 mb-4" src="">
                <h2 id="u-name" class="text-2xl font-black italic">Loading...</h2>
                <p id="u-email" class="text-gray-400 text-xs mb-8"></p>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-gray-400">TASKS</p>
                        <p class="text-xl font-black">12</p>
                    </div>
                    <div class="bg-gray-50 p-4 rounded-2xl">
                        <p class="text-[10px] font-bold text-gray-400">RANK</p>
                        <p class="text-xl font-black">#42</p>
                    </div>
                </div>

                <button onclick="logout()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-gray-400 hover:text-red-500">Sign Out Account</button>
            </div>
        </div>

        <!-- Bottom Navigation -->
        <nav class="bottom-nav">
            <div class="nav-item" onclick="switchTab('home')">
                <i class="fas fa-home"></i>
                <span>Home</span>
            </div>
            <div class="nav-item" onclick="switchTab('mine')">
                <i class="fas fa-user"></i>
                <span>Mine</span>
            </div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB8ojmpCLGwapx2VdC1trWwXQYz08tfos4",
            authDomain: "taskmile-13678.firebaseapp.com",
            projectId: "taskmile-13678",
            storageBucket: "taskmile-13678.firebasestorage.app",
            messagingSenderId: "489392612402",
            appId: "1:489392612402:web:b565059c586e4a16af482b"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        window.handleGoogleLogin = async () => {
            try {
                await signInWithPopup(auth, provider);
            } catch (e) {
                console.error("Login Error", e);
            }
        };

        window.logout = () => signOut(auth);

        window.switchTab = (tab) => {
            document.querySelectorAll('.app-view').forEach(v => v.classList.remove('active'));
            document.getElementById('view-' + tab).classList.add('active');
        };

        onAuthStateChanged(auth, (user) => {
            if (user) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-app').style.display = 'block';
                document.getElementById('u-name').innerText = user.displayName;
                document.getElementById('u-email').innerText = user.email;
                document.getElementById('u-img-nav').src = user.photoURL;
                document.getElementById('u-img-big').src = user.photoURL;
            } else {
                document.getElementById('auth-screen').style.display = 'flex';
                document.getElementById('main-app').style.display = 'none';
            }
        });
    </script>
</body>
</html>
