<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TaskMile - Fixed Connection</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background-color: #f3f4f6; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .nav-active { color: #000 !important; }
        .task-card:active { transform: scale(0.96); transition: 0.1s; }
        #loading-overlay { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); transition: opacity 0.5s ease; }
    </style>
</head>
<body class="max-w-md mx-auto bg-white min-h-screen relative shadow-xl">

    <!-- Loading Screen -->
    <div id="loading-overlay" class="fixed inset-0 z-[300] flex items-center justify-center">
        <div class="text-center p-6">
            <div class="animate-spin text-[#FFCD00] text-6xl mb-6"><i class="fas fa-circle-notch"></i></div>
            <h2 class="text-lg font-black text-gray-800">TASKMILE</h2>
            <p id="loading-status" class="text-[10px] font-bold text-gray-400 uppercase tracking-[0.2em] mt-2">Initializing System...</p>
            <button id="retry-btn" onclick="location.reload()" class="hidden mt-6 bg-black text-white px-6 py-2 rounded-full text-xs font-bold">RETRY CONNECTION</button>
        </div>
    </div>

    <!-- Screen 1: Home -->
    <div id="screen-home" class="pb-24">
        <div class="bg-[#FFCD00] p-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
            <h1 class="text-2xl font-black italic">TaskMile</h1>
            <div class="bg-white/40 px-3 py-1.5 rounded-full text-xs font-black flex items-center gap-1">
                <span>🪙</span>
                <span id="balance-display">0.00</span>
            </div>
        </div>

        <div class="m-4 bg-yellow-50 border border-yellow-200 rounded-[30px] p-6">
            <h2 class="text-xl font-black">Ready to test?</h2>
            <p class="text-[10px] text-gray-500 font-bold mt-1">TAP ANY TASK TO ADD COINS INSTANTLY</p>
        </div>

        <div class="p-4 space-y-4">
            <!-- Test Task 1 -->
            <div onclick="handleTask(500)" class="task-card bg-white border-2 border-gray-100 p-4 rounded-3xl flex items-center gap-4 shadow-sm cursor-pointer active:bg-gray-50">
                <div class="w-12 h-12 bg-blue-500 rounded-2xl flex items-center justify-center text-white text-xl">
                    <i class="fab fa-telegram-plane"></i>
                </div>
                <div class="flex-1">
                    <h3 class="text-sm font-black uppercase">Telegram Test</h3>
                    <p class="text-[10px] text-gray-400 font-bold">Instant Credit</p>
                </div>
                <div class="text-right">
                    <span class="text-green-600 font-black text-sm">+500</span>
                </div>
            </div>

            <!-- Test Task 2 -->
            <div onclick="handleTask(1000)" class="task-card bg-white border-2 border-gray-100 p-4 rounded-3xl flex items-center gap-4 shadow-sm cursor-pointer active:bg-gray-50">
                <div class="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white text-xl">
                    <i class="fab fa-youtube"></i>
                </div>
                <div class="flex-1">
                    <h3 class="text-sm font-black uppercase">YouTube Test</h3>
                    <p class="text-[10px] text-gray-400 font-bold">High Bonus</p>
                </div>
                <div class="text-right">
                    <span class="text-green-600 font-black text-sm">+1000</span>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t h-20 flex items-center justify-around z-[100]">
        <button class="nav-active flex flex-col items-center gap-1">
            <i class="fas fa-home text-xl"></i>
            <span class="text-[8px] font-black">HOME</span>
        </button>
        <button class="text-gray-300 flex flex-col items-center gap-1 opacity-50">
            <i class="fas fa-wallet text-xl"></i>
            <span class="text-[8px] font-black">WALLET</span>
        </button>
    </nav>

    <!-- Custom Alert -->
    <div id="alert" class="fixed inset-0 bg-black/60 z-[500] hidden flex items-center justify-center p-8">
        <div class="bg-white rounded-[40px] p-8 w-full max-w-xs text-center">
            <div class="text-green-500 text-5xl mb-4"><i class="fas fa-check-circle"></i></div>
            <h3 class="text-xl font-black italic">SUCCESS!</h3>
            <p id="alert-msg" class="text-sm text-gray-500 font-bold mt-2"></p>
            <button onclick="closeAlert()" class="w-full mt-6 bg-[#FFCD00] py-4 rounded-full font-black text-sm">DONE</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'taskmile-v3';

        let userProfileRef = null;
        let connectionTimeout = setTimeout(() => {
            document.getElementById('loading-status').innerText = "Connection taking too long...";
            document.getElementById('retry-btn').classList.remove('hidden');
        }, 8000);

        async function initApp() {
            try {
                document.getElementById('loading-status').innerText = "Authenticating...";
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Auth error:", err);
                document.getElementById('loading-status').innerText = "Auth Failed. Try again.";
            }
        }

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                clearTimeout(connectionTimeout);
                document.getElementById('loading-status').innerText = "Fetching Profile...";
                
                userProfileRef = doc(db, 'artifacts', appId, 'users', user.uid, 'profile', 'data');
                
                try {
                    const snap = await getDoc(userProfileRef);
                    if (!snap.exists()) {
                        await setDoc(userProfileRef, { balance: 0, tasks: 0 });
                    }

                    onSnapshot(userProfileRef, (doc) => {
                        if (doc.exists()) {
                            const data = doc.data();
                            document.getElementById('balance-display').innerText = (data.balance || 0).toFixed(2);
                            document.getElementById('loading-overlay').style.opacity = '0';
                            setTimeout(() => {
                                document.getElementById('loading-overlay').style.display = 'none';
                            }, 500);
                        }
                    }, (err) => {
                        console.error("Snapshot error:", err);
                    });
                } catch (err) {
                    console.error("Database error:", err);
                }
            }
        });

        window.handleTask = async (reward) => {
            if (!userProfileRef) return;
            try {
                await updateDoc(userProfileRef, {
                    balance: increment(reward),
                    tasks: increment(1)
                });
                document.getElementById('alert-msg').innerText = `You earned ${reward} coins!`;
                document.getElementById('alert').classList.remove('hidden');
            } catch (err) {
                alert("Error claiming reward. Check connection.");
            }
        };

        window.closeAlert = () => document.getElementById('alert').classList.add('hidden');

        initApp();
    </script>
</body>
</html>
